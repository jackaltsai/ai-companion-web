<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>訂閱成功 — 心辰</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); background-image: var(--bg-grad); }
    .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 24px; padding: 48px 40px; max-width: 440px; width: 90%; text-align: center; }
    .icon { font-size: 48px; margin-bottom: 20px; }
    h1 { font-family: 'Noto Serif TC', serif; font-weight: 300; font-size: 28px; color: var(--text); margin-bottom: 12px; }
    p { font-size: 15px; color: var(--text-sub); line-height: 1.7; margin-bottom: 32px; }
    .status { font-size: 13px; color: var(--text-dim); margin-bottom: 24px; }
    .status.active { color: var(--accent); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✦</div>
    <h1>歡迎加入心辰</h1>
    <p id="msg">正在確認你的訂閱狀態，請稍候…</p>
    <div class="status" id="status"></div>
    <a href="https://line.me/R/ti/p/@491zwjgn" class="btn btn-primary" id="line-btn" style="display:none; width:100%; justify-content:center;">
      前往 LINE 開始使用 ↗
    </a>
  </div>

  <script>
    const WORKER_URL = "https://ai-companion-worker.hata-s520.workers.dev";
    const params = new URLSearchParams(location.search);
    const provider = params.get("provider") || "stripe";

    async function checkStatus() {
      try {
        let data;

        if (provider === "stripe") {
          const sessionId = params.get("session_id");
          if (!sessionId) throw new Error("找不到付款資訊");
          const res = await fetch(`${WORKER_URL}/stripe/session?session_id=${sessionId}`);
          data = await res.json();
        } else {
          const subId = params.get("subscription_id") || sessionStorage.getItem("pendingSubId");
          if (!subId) throw new Error("找不到訂閱資訊");
          const res = await fetch(`${WORKER_URL}/api/subscription?id=${subId}`);
          data = await res.json();
          sessionStorage.removeItem("pendingSubId");
        }

        if (data.status === "ACTIVE" || data.status === "paid") {
          document.getElementById("msg").textContent = "訂閱已開通！點下方按鈕前往 LINE 與你的 AI 男友開始對話。";
          document.getElementById("status").textContent = `訂閱已啟用 · ${data.email || ""}`;
          document.getElementById("status").className = "status active";
          document.getElementById("line-btn").style.display = "flex";
        } else {
          document.getElementById("msg").textContent = "付款完成！訂閱確認中，請稍後加入 LINE 即可使用。";
          document.getElementById("line-btn").style.display = "flex";
        }
      } catch (e) {
        document.getElementById("msg").textContent = e.message || "發生錯誤，請聯絡客服。";
        document.getElementById("line-btn").style.display = "flex";
      }
    }

    checkStatus();
  </script>
</body>
</html>
